<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
	<meta http-equiv="Permissions-Policy" content="fullscreen=(self)" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IPTV Плеер – Tailwind Redesign</title>
	
	 <!-- Загрузка стилей -->
	<link rel="stylesheet" href="styles.css" />

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- AOS (Animate On Scroll) -->
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />
  </head>
  <body class="bg-gray-900 text-gray-100 antialiased font-sans">
    <!-- ▸ HEADER -->
    <header class="bg-gray-800/90 backdrop-blur-md shadow-lg sticky top-0 z-50" data-aos="fade-down">
      <div class="max-w-7xl mx-auto px-4 lg:px-8 flex items-center justify-between h-16">
        <div class="flex items-center gap-2">
          <img src="/logo.svg" alt="Logo" class="w-8 h-8 object-contain" />
          <span class="text-lg font-semibold tracking-wide">IPTV Плеер</span>
        </div>
        <a href="#channel-list" class="lg:hidden text-gray-400 hover:text-white focus:outline-none" aria-label="Список каналов">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
        </a>
      </div>
    </header>

    <!-- ▸ LAYOUT -->
    <main class="max-w-7xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-12 gap-6" data-aos="fade-up" data-aos-delay="150">
	
      <!-- ▸ SIDEBAR (CHANNEL LIST) -->
      <aside id="channel-list" class="lg:col-span-4 xl:col-span-3 flex flex-col gap-4 bg-gray-800 rounded-2xl p-4 overflow-hidden shadow-xl" data-aos="fade-right" data-aos-delay="200">
	  
  <!-- Search -->
  <div class="relative">
    <input type="text" id="searchInput" placeholder="Поиск канала..." class="w-full rounded-xl bg-gray-700 pl-10 pr-4 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none placeholder-gray-400" />
    <svg xmlns="http://www.w3.org/2000/svg" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35m0 0A7.5 7.5 0 1110.5 3a7.5 7.5 0 016.15 11.65z" /></svg>
  </div>

  <!-- Channels container -->
  <div id="channel-list-items" class="channel-list-container flex-1 overflow-y-auto space-y-2 pr-1"></div>
</aside>

      <!-- ▸ PLAYER SECTION -->
      <section class="lg:col-span-8 xl:col-span-9 flex flex-col gap-4" data-aos="fade-left" data-aos-delay="200">
        <div id="player-container" class="relative w-full overflow-hidden rounded-2xl shadow-2xl aspect-video bg-black">
          <!-- Loading overlay -->
          <div id="loading-overlay" class="absolute inset-0 flex items-center justify-center bg-black/60 backdrop-blur-sm hidden">
            <div id="loading-spinner" class="loader ease-linear rounded-full border-8 border-t-transparent h-16 w-16"></div>
          </div>

          <!-- Native video element for HLS -->
          <video id="video" class="w-full h-full" autoplay playsinline></video>

          <!-- YouTube iframe placeholder -->
          <div id="youtube-container" class="absolute inset-0 hidden">
            <iframe id="youtube-frame" class="w-full h-full" frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe>
          </div>
        </div>

        <!-- Channel info -->
        <div id="channel-info" class="flex items-center gap-4 p-4 bg-gray-800 rounded-2xl shadow-lg">
          <img id="channel-logo" src="" alt="Логотип канала" class="w-16 h-16 object-contain rounded-md bg-gray-700" />
          <div class="space-y-1">
            <h2 id="channel-name" class="text-xl font-semibold leading-tight">Выберите канал</h2>
            <p id="channel-desc" class="text-gray-400 text-sm"></p>
          </div>
        </div>
		
		<!-- ▸ EPG Program Guide -->
        <div id="epg-container" class="bg-gray-800 rounded-2xl shadow-lg overflow-hidden">
         <div class="p-4 border-b border-gray-700">
         <h3 class="font-semibold text-lg">Сейчас в эфире</h3>
        </div>
         <div id="epg-program-list" class="max-h-48 overflow-y-auto">
          <!-- Программа будет загружена здесь -->
         </div>
        </div>

        <!-- Custom controls injected by JS -->
        <div id="custom-controls"></div>
      </section>
    </main>

    <!-- ▸ FOOTER -->
    <footer class="mt-12 py-6 text-center text-sm text-gray-500" data-aos="fade-up" data-aos-delay="300">
      &copy; <span id="year"></span> IPTV Плеер. Все права защищены.
    </footer>

    <!-- ▸ SCRIPTS -->
    <script src="channels.js"></script>
	<script src="search.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="player-controls.js"></script>
	<script src="epg.js" type="module"></script>
    <script src="player.js" defer></script>
    <!-- Helpers -->
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>
      // Init libraries
      AOS.init({ once: true, duration: 700 });
      document.getElementById('year').textContent = new Date().getFullYear();

// Инициализация при загрузке
document.addEventListener('DOMContentLoaded', () => {
  renderChannelList();
  setupSearch();
  
  // Запускаем первый канал
  if (playlist.length > 0) {
    playChannel(playlist[0], 0).catch(console.error);
  }
});

      /*
        ▸ Patch legacy loader helpers so они знают про наш новый overlay.
        Старые loading.js → showLoader()/hideLoader() работали c #loading-spinner.
        Мы оставили этот id, но также показываем / скрываем overlay для затемнения.
      */
      window.showLoader = () => {
        document.getElementById('loading-overlay')?.classList.remove('hidden');
        document.getElementById('loading-spinner')?.style.setProperty('display', 'block');
      };
      window.hideLoader = () => {
        document.getElementById('loading-overlay')?.classList.add('hidden');
        document.getElementById('loading-spinner')?.style.setProperty('display', 'none');
      };
    </script>

    <!-- Custom scrollbar + loader CSS -->
    <style>
</style>
  </body>
</html>
